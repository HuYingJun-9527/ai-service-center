# 在文件末尾添加以下Swagger配置
springdoc:
  api-docs:
    path: /api/v3/api-docs
  swagger-ui:
    path: /api/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true
  packages-to-scan: com.hyj.aicodehelper.controller
  paths-to-match: /api/**

  # RAG数据管理配置
rag:
  # 文件上传临时目录
