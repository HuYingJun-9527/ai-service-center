          max-idle: 8        # 连接池最大空闲连接数
          min-idle: 0        # 连接池最小空闲连接数
          max-wait: -1ms     # 连接池最大阻塞等待时间
server:
  port: 8081
  servlet:
    context-path: /api
    multipart:
      enabled: true
      max-file-size: 10MB      # 单个文件最大 10MB
      max-request-size: 20MB  # 请求最大 20MB
